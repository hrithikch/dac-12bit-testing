[firmware]
fqbn   = "adafruit:samd:adafruit_itsybitsy_m0"
sketch = "firmware/Arduino_DAC_framework"

[hardware]
port = "COM6"
baudrate = 115200

[dac]
f_out = 266.24e6
f_sample = 5.24288e9
num_samples = 256

[rails]
AVDD = 0.88
AVDD0P85 = 0.88
AVDD18 = 1.8
DVDD = 0.88
VCM = 0.65

[coherent_tone]
fs_app = 5000.0
x_seed = 4
fin    = "low"    # "low" or "high" — which prime bin sets f_out

[instruments]
siggen_addr = "TCPIP0::192.168.10.159::hislip0::INSTR"   # R&S SMA100B (HiSLIP)
scope_addr  = "TCPIP0::S254A-1246709::hislip0::INSTR"  # Keysight MSOS054A (HiSLIP) — update IP
sa_addr     = "TCPIP0::K-N9010B-00524::hislip0::INSTR"  # Keysight N9010B EXA (HiSLIP) — update IP
siggen_level = "700 mV"

[paths]
sine_output = "data/generated_patterns/sine_codes.json"
coherent_tone_plan = "data/coherent_tone_plan.json"

[sweep]
config = "default"   # name of the active sweep file in config/sweeps/
